<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Birthday Quest</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        #goal-image { width: 180px; border: 3px solid #00ff88; border-radius: 12px; margin-bottom: 20px; }
        #container { position: relative; width: 100%; max-width: 640px; aspect-ratio: 4/3; background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #loading-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff88; font-weight: bold; text-align: center; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0, 255, 136, 0.9); z-index: 100; justify-content: center; align-items: center; font-size: 3rem; color: black; font-weight: bold; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 30px; border-radius: 20px; border: 2px solid #00ff88; z-index: 101; text-align: center; width: 300px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .code-box { background: #000; padding: 15px; margin: 20px 0; font-family: monospace; border: 1px dashed #00ff88; color: #00ff88; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h3 style="color: #00ff88; text-align: center;">Сделай такое же лицо, чтобы забрать подарок!</h3>
    <img src="goal.jpg" id="goal-image">

    <div id="container">
        <div id="loading-status">Загрузка нейросети...<br>(это может занять 5-10 сек)</div>
        <video id="video" autoplay muted playsinline></video>
    </div>

    <div id="overlay">ПИДОР НАЙДЕН!</div>

    <div id="modal">
        <h2 style="margin-top:0">🎂 С Днём Рождения!</h2>
        <p>Доступ разрешен. Твой код:</p>
        <div class="code-box">RA-4665UMBETK7WPETK</div>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer; background: #00ff88; border: none; border-radius: 5px; font-weight: bold;">Попробовать снова</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const loadingStatus = document.getElementById('loading-status');

        async function init() {
            try {
                // Загружаем модели напрямую из твоего репозитория
                // Важно: точка перед /models обязательна для GitHub Pages
                await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
                await faceapi.nets.faceExpressionNet.loadFromUri('./models');
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    loadingStatus.style.display = 'none';
                    startDetection();
                };
            } catch (err) {
                loadingStatus.innerHTML = "Ошибка доступа к камере или моделям.<br>Убедись, что папка 'models' загружена на GitHub.";
                console.error(err);
            }
        }

        function startDetection() {
            setInterval(async () => {
                if (video.paused) return;

                const detections = await faceapi.detectAllFaces(
                    video, 
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceExpressions();

                if (detections.length > 0) {
                    const expressions = detections[0].expressions;
                    // Если лицо "удивленное" (вытянутые губы часто так считываются)
                    if (expressions.surprised > 0.4 || expressions.neutral < 0.2) {
                        video.pause();
                        document.getElementById('overlay').style.display = 'flex';
                        setTimeout(() => {
                            document.getElementById('overlay').style.display = 'none';
                            document.getElementById('modal').style.display = 'block';
                        }, 2000);
                    }
                }
            }, 400);
        }

        init();
    </script>
</body>
</html>
